<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Jasa — AsaHub</title>

<link rel="icon" type="image/png" href="img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body style="margin:0;background:#000;color:#fff;font-family:'DM Sans',sans-serif;">

<div style="display:flex;min-height:100vh;">

<!-- SIDEBAR -->
<aside id="sidebar" style="width:260px;background:#FFC107;padding:20px;position:fixed;height:100vh;overflow-y:auto;z-index:1000;transition:.3s;">

<div style="display:flex;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid rgba(255,255,255,.2);">

<a href="index.html" style="font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px;">
🛠️ AsaHub
</a>

<button id="sidebarClose" style="margin-left:auto;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">×</button>

</div>

<nav>

<div style="display:flex;flex-direction:column;gap:5px;">

<a href="#" data-section="dashboard" style="display:flex;gap:12px;padding:12px 16px;color:#fff;text-decoration:none;border-radius:8px;background:rgba(255,255,255,.2);">
📊 Dashboard
</a>

<a href="#" data-section="services" style="display:flex;gap:12px;padding:12px 16px;color:#fff;text-decoration:none;border-radius:8px;">
🛠️ Kelola Layanan
</a>

<a href="#" data-section="orders" style="display:flex;gap:12px;padding:12px 16px;color:#fff;text-decoration:none;border-radius:8px;">
📋 Pesanan Masuk
</a>

<a href="#" data-section="history" style="display:flex;gap:12px;padding:12px 16px;color:#fff;text-decoration:none;border-radius:8px;">
📜 Riwayat
</a>

<a href="#" data-section="profile" style="display:flex;gap:12px;padding:12px 16px;color:#fff;text-decoration:none;border-radius:8px;">
👤 Profil
</a>

</div>

</nav>

<div style="margin-top:auto;padding-top:20px;">
<a href="login.html" style="display:flex;justify-content:center;align-items:center;width:100%;padding:10px 20px;border-radius:8px;border:2px solid #fff;color:#fff;text-decoration:none;font-weight:600;">
🚪 Keluar
</a>
</div>

</aside>

<!-- MAIN -->
<main style="flex:1;margin-left:260px;min-height:100vh;background:#000;">

<!-- TOP NAV -->
<header style="background:#FFC107;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.1);">

<div style="display:flex;align-items:center;gap:20px;">

<button id="sidebarToggle" style="display:none;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">☰</button>

<h1 style="font-family:Syne,sans-serif;font-size:1.5rem;margin:0;color:#fff;">
Dashboard Penyedia Jasa
</h1>

</div>

<div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.2);padding:8px 16px;border-radius:25px;">
<div style="width:35px;height:35px;border-radius:50%;background:#fff;color:#FFC107;display:flex;align-items:center;justify-content:center;font-weight:bold;">
P
</div>
<span>Penyedia Jasa</span>
</div>

</header>

<!-- CONTENT -->
<div style="padding:30px;">

<!-- DASHBOARD SECTION -->
<section id="dashboard" class="dashboard-section">

<div style="text-align:center;padding:40px;background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:30px;">
<h3 style="font-family:Syne;font-size:1.8rem;margin-bottom:10px;">
Selamat Datang Penyedia Jasa! 🎉
</h3>
<p style="opacity:.8;margin-bottom:20px;">
Kelola layanan Anda dan raih kesuksesan di AsaHub
</p>
</div>

<!-- STATS GRID -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;">

<div style="background:rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;">
<div id="totalOrders" style="font-size:2rem;font-weight:700;color:#fff;">0</div>
<div style="font-size:.9rem;opacity:.8;">Total Pesanan Masuk</div>
</div>

<div style="background:rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;">
<div id="activeOrders" style="font-size:2rem;font-weight:700;">0</div>
<div style="font-size:.9rem;opacity:.8;">Pesanan Aktif</div>
</div>

<div style="background:rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;">
<div id="monthlyRevenue" style="font-size:2rem;font-weight:700;">Rp 0</div>
<div style="font-size:.9rem;opacity:.8;">Pendapatan Bulan Ini</div>
</div>

<div style="background:rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;">
<div id="rating" style="font-size:2rem;font-weight:700;">0.0</div>
<div style="font-size:.9rem;opacity:.8;">Rating</div>
</div>

</div>

</section>

</div>

</main>

</div>

<!-- MOBILE NAV -->
<nav style="display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#FFC107;justify-content:space-around;align-items:center;z-index:1000;"
class="mobile-nav">

<a href="#" style="color:#000;"><i class="fas fa-home"></i></a>
<a href="#"><i class="fas fa-tools"></i></a>
<a href="#"><i class="fas fa-list"></i></a>
<a href="#"><i class="fas fa-user"></i></a>

</nav>

<script>
if(window.innerWidth<=768){
document.querySelector('.mobile-nav').style.display='flex';
document.getElementById('sidebarToggle').style.display='block';
document.getElementById('sidebar').style.transform='translateX(-100%)';
}

document.getElementById('sidebarToggle')?.addEventListener('click',()=>{
document.getElementById('sidebar').style.transform='translateX(0)';
});

document.getElementById('sidebarClose')?.addEventListener('click',()=>{
document.getElementById('sidebar').style.transform='translateX(-100%)';
});
</script>

</body>
</html>
