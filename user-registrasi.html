<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi User - AsaHub</title>

<link rel="icon" type="image/png" href="../img/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive-mobile.css">
<link rel="stylesheet" href="css/responsive-desktop.css">
<link rel="stylesheet" href="css/mobile-navigation.css">

<!-- CSS BARU -->
<link rel="stylesheet" href="css/user.register.css">

</head>
<body>

<!-- Navigation tetap seperti punya kamu -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">Asa<span>Hub</span></a>
        <div class="nav-links">
            <a href="index.html">Marketplace</a>
            <a href="jasa.html">Jasa</a>
            <a href="edukasi.html">Edukasi</a>
            <a href="komunitas.html">Komunitas</a>
            <a href="tentang.html">Tentang</a>
        </div>
    </div>
</nav>

<!-- REGISTRATION -->
<div class="registration-container">
    <div class="registration-card">

        <div class="registration-header">
            <div class="registration-logo">Asa<span>Hub</span></div>
            <div class="registration-subtitle">Registrasi User</div>
        </div>

        <div class="progress-indicator">
            <div class="progress-step completed">
                <div class="progress-number">1</div>
                <span>Pilih Akun</span>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step active">
                <div class="progress-number">2</div>
                <span>Isi Form</span>
            </div>
        </div>

        <form id="registrationForm">

            <div class="form-section">
                <h3 class="section-title">Informasi Akun</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap *</label>
                        <input type="text" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-input" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" class="form-input" required>
                </div>
            </div>

            <div class="btn-container">
                <a href="daftar.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Kembali
                </a>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i> DAFTAR
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
