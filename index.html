<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsaHub - Marketplace</title>

<link rel="icon" type="image/png" href="img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--brand:#FFC107;
--bg:#0a0a0a;
--bg2:#111;
--bg3:#1a1a1a;
--text:#fff;
--muted:#888;
--nav-h:64px;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
padding-top:var(--nav-h);
}

/* ================= NAVBAR ================= */

.navbar{
position:fixed;
top:0;left:0;right:0;
height:var(--nav-h);
background:var(--brand);
display:flex;
align-items:center;
z-index:1000;
box-shadow:0 2px 20px rgba(0,0,0,.3);
}

.nav-container{
max-width:1280px;
margin:auto;
padding:0 24px;
display:flex;
align-items:center;
gap:24px;
width:100%;
}

.nav-logo{
font-family:'Syne';
font-size:1.5rem;
font-weight:800;
color:#fff;
text-decoration:none;
}
.nav-logo span{color:#000}

.nav-links{
display:flex;
gap:6px;
flex:1;
}
.nav-links a{
color:#fff;
text-decoration:none;
padding:8px 14px;
border-radius:8px;
font-size:.95rem;
}
.nav-links a.active,
.nav-links a:hover{
background:rgba(0,0,0,.15);
}

.nav-auth{
display:flex;
gap:10px;
}

.btn{
padding:8px 20px;
border-radius:8px;
font-weight:600;
font-size:.9rem;
text-decoration:none;
}

.btn-outline{
border:2px solid #fff;
color:#fff;
}

.btn-primary{
background:#000;
color:#fff;
border:2px solid #000;
}

.mobile-menu-toggle{
display:none;
background:none;
border:none;
font-size:1.3rem;
color:#fff;
margin-left:auto;
}

/* ================= LAYOUT ================= */

.marketplace-layout{
display:flex;
max-width:1280px;
margin:auto;
padding:30px 20px 120px;
gap:30px;
}

.sidebar{
width:260px;
background:var(--bg2);
padding:20px;
border-radius:16px;
}

.sidebar h3{
margin-bottom:14px;
font-size:1rem;
}

.sidebar label{
display:block;
margin:8px 0;
cursor:pointer;
color:#ccc;
}

.main{
flex:1;
}

.search-bar{
background:var(--bg3);
border-radius:10px;
padding:10px 14px;
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.search-bar input{
background:none;
border:none;
outline:none;
color:#fff;
flex:1;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.product-card{
background:var(--bg2);
border-radius:16px;
padding:16px;
transition:.3s;
border:1px solid rgba(255,255,255,.05);
}

.product-card:hover{
transform:translateY(-6px);
border-color:var(--brand);
}

.product-title{
font-weight:700;
margin-bottom:6px;
}

.product-price{
color:var(--brand);
font-weight:700;
margin-top:10px;
}

/* ================= MODAL ================= */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal.open{display:flex}

.modal-content{
background:var(--bg3);
padding:30px;
border-radius:16px;
width:90%;
max-width:500px;
}

/* ================= MOBILE ================= */

.mobile-bottom-nav{
display:none;
position:fixed;
bottom:0;left:0;right:0;
height:60px;
background:var(--brand);
justify-content:space-around;
align-items:center;
z-index:1000;
}

.mobile-bottom-nav a{
flex:1;
text-align:center;
color:rgba(0,0,0,.5);
font-size:1.2rem;
text-decoration:none;
}

.mobile-bottom-nav a.active{color:#000}

@media(max-width:768px){

.nav-links,.nav-auth,.sidebar{display:none}
.mobile-menu-toggle{display:block}
.marketplace-layout{flex-direction:column}
.mobile-bottom-nav{display:flex}
body{padding-bottom:60px}
.navbar{height:56px}

}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="nav-container">
<a href="index.html" class="nav-logo">Asa<span>Hub</span></a>

<div class="nav-links">
<a href="index.html" class="active">Marketplace</a>
<a href="jasa.html">Jasa</a>
<a href="edukasi.html">Edukasi</a>
<a href="komunitas.html">Komunitas</a>
<a href="tentang.html">Tentang</a>
</div>

<div class="nav-auth">
<a href="login.html" class="btn btn-outline">Masuk</a>
<a href="daftar.html" class="btn btn-primary">Daftar</a>
</div>

<button class="mobile-menu-toggle">
<i class="fas fa-bars"></i>
</button>
</div>
</nav>

<!-- MARKETPLACE -->
<div class="marketplace-layout">

<aside class="sidebar">
<h3>Kategori</h3>
<label><input type="radio" name="cat" checked> Semua</label>
<label><input type="radio" name="cat"> Elektronik</label>
<label><input type="radio" name="cat"> Fashion</label>
<label><input type="radio" name="cat"> Makanan</label>
</aside>

<main class="main">

<div class="search-bar">
<i class="fas fa-search"></i>
<input type="text" placeholder="Cari produk...">
</div>

<div class="products-grid">

<div class="product-card">
<div class="product-title">Laptop Gaming</div>
<div>Elektronik</div>
<div class="product-price">Rp 12.000.000</div>
</div>

<div class="product-card">
<div class="product-title">Jaket Hoodie</div>
<div>Fashion</div>
<div class="product-price">Rp 250.000</div>
</div>

<div class="product-card">
<div class="product-title">Kopi Premium</div>
<div>Makanan</div>
<div class="product-price">Rp 85.000</div>
</div>

</div>

</main>
</div>

<!-- MOBILE NAV -->
<nav class="mobile-bottom-nav">
<a href="index.html" class="active"><i class="fas fa-home"></i></a>
<a href="jasa.html"><i class="fas fa-briefcase"></i></a>
<a href="edukasi.html"><i class="fas fa-graduation-cap"></i></a>
<a href="komunitas.html"><i class="fas fa-users"></i></a>
<a href="tentang.html"><i class="fas fa-info-circle"></i></a>
<a href="login.html"><i class="fas fa-user"></i></a>
</nav>

</body>
</html>
