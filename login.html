<script>
// Mobile Navigation
const mobileMenu = document.getElementById('mobileMenu');
const mobileMenuClose = document.getElementById('mobileMenuClose');
const menuOverlay = document.getElementById('menuOverlay');
const mobileNav = document.querySelector('.mobile-nav');

function toggleMobileMenu(show) {
    if (show) {
        mobileMenu.style.right = '0';
        menuOverlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
    } else {
        mobileMenu.style.right = '-280px';
        menuOverlay.style.display = 'none';
        document.body.style.overflow = '';
    }
}

mobileMenuClose?.addEventListener('click', () => toggleMobileMenu(false));
menuOverlay?.addEventListener('click', () => toggleMobileMenu(false));

// Close menu when clicking on links
mobileMenu?.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => toggleMobileMenu(false));
});

// NEW HAMBURGER MENU SYSTEM - POJOK KANAN ATAS
const mobileHamburger = document.getElementById('mobileHamburger');
const mobileNavMenu = document.getElementById('mobileNavMenu');
const mobileNavOverlay = document.getElementById('mobileNavOverlay');
const mobileNavClose = document.getElementById('mobileNavClose');

function toggleMobileNavMenu(show) {
    if (show) {
        mobileNavMenu.classList.add('active');
        mobileNavOverlay.classList.add('active');
        mobileHamburger.classList.add('active');
        document.body.style.overflow = 'hidden';
    } else {
        mobileNavMenu.classList.remove('active');
        mobileNavOverlay.classList.remove('active');
        mobileHamburger.classList.remove('active');
        document.body.style.overflow = '';
    }
}

mobileHamburger?.addEventListener('click', () => {
    const isActive = mobileNavMenu.classList.contains('active');
    toggleMobileNavMenu(!isActive);
});
mobileNavClose?.addEventListener('click', () => toggleMobileNavMenu(false));
mobileNavOverlay?.addEventListener('click', () => toggleMobileNavMenu(false));

// Close menu when clicking on links
mobileNavMenu?.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => toggleMobileNavMenu(false));
});

// Responsive behavior
function handleResize() {
    if (window.innerWidth <= 768) {
        mobileNav.style.display = 'flex';
        
        // Hide desktop menu items
        document.querySelector('nav > div > div:nth-child(2)').style.display = 'none';
        document.querySelector('nav > div > div:nth-child(3)').style.display = 'none';
    } else {
        mobileNav.style.display = 'none';
        toggleMobileMenu(false);
        
        // Show desktop menu items
        document.querySelector('nav > div > div:nth-child(2)').style.display = 'flex';
        document.querySelector('nav > div > div:nth-child(3)').style.display = 'flex';
    }
}

// Initial check and event listener
handleResize();
window.addEventListener('resize', handleResize);

// Login form handler
document.getElementById('loginForm')?.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const accountType = document.getElementById('accountType').value;
    
    if (!email || !password || !accountType) {
        alert('Harap lengkapi semua field');
        return;
    }
    
    // Simulate login process
    console.log('Login attempt:', { email, accountType });
    
    // Redirect based on account type
    const redirects = {
        'user': 'index.html',
        'seller': 'seller-dashboard.html',
        'provider': 'jasa-dashboard.html',
        'mentor': 'edukasi-dashboard.html'
    };
    
    if (redirects[accountType]) {
        window.location.href = redirects[accountType];
    }
});

// Dynamic registration link based on account type
const accountTypeSelect = document.getElementById('accountType');
const registerLink = document.getElementById('registerLink');

function updateRegisterLink() {
    const accountType = accountTypeSelect.value;
    const registrationPages = {
        'user': 'user-registrasi.html',
        'seller': 'seller-registrasi.html', 
        'provider': 'jasa-registrasi.html',
        'mentor': 'edukasi-registrasi.html'
    };
    
    if (registrationPages[accountType]) {
        registerLink.href = registrationPages[accountType];
    } else {
        registerLink.href = 'daftar.html'; // Default page
    }
}

// Update link when account type changes
accountTypeSelect?.addEventListener('change', updateRegisterLink);

// Initialize link on page load
updateRegisterLink();
</script>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
e.preventDefault();

const email=document.getElementById('email').value.trim();
const password=document.getElementById('password').value;
const type=document.getElementById('accountType').value;

if(!email||!password||!type){
alert("Semua field wajib diisi!");
return;
}

const btn=document.getElementById('loginBtn');

btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Memproses...';
btn.disabled=true;

localStorage.setItem("userLoggedIn","true");
localStorage.setItem("userType",type);
localStorage.setItem("userName",email.split("@")[0]||"User");
localStorage.setItem("userEmail",email);

setTimeout(()=>{
if(type==="user") window.location.href="index.html";
else if(type==="seller") window.location.href="seller-dashboard.html";
else if(type==="provider") window.location.href="jasa-dashboard.html";
else if(type==="mentor") window.location.href="edukasi-dashboard.html";
},1200);

});
</script>
