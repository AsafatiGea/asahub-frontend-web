<script>
// Mobile Navigation
const hamburgerToggle = document.getElementById('hamburgerToggle');
const mobileMenu = document.getElementById('mobileMenu');
const mobileMenuClose = document.getElementById('mobileMenuClose');
const menuOverlay = document.getElementById('menuOverlay');
const mobileNav = document.querySelector('.mobile-nav');

function toggleMobileMenu(show) {
    if (show) {
        mobileMenu.style.right = '0';
        menuOverlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
    } else {
        mobileMenu.style.right = '-280px';
        menuOverlay.style.display = 'none';
        document.body.style.overflow = '';
    }
}

hamburgerToggle?.addEventListener('click', () => toggleMobileMenu(true));
mobileMenuClose?.addEventListener('click', () => toggleMobileMenu(false));
menuOverlay?.addEventListener('click', () => toggleMobileMenu(false));

// Close menu when clicking on links
mobileMenu?.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => toggleMobileMenu(false));
});

// Responsive behavior
function handleResize() {
    if (window.innerWidth <= 768) {
        hamburgerToggle.style.display = 'block';
        mobileNav.style.display = 'flex';
        
        // Hide desktop menu items
        document.querySelector('nav > div > div:nth-child(2)').style.display = 'none';
        document.querySelector('nav > div > div:nth-child(3)').style.display = 'none';
    } else {
        hamburgerToggle.style.display = 'none';
        mobileNav.style.display = 'none';
        toggleMobileMenu(false);
        
        // Show desktop menu items
        document.querySelector('nav > div > div:nth-child(2)').style.display = 'flex';
        document.querySelector('nav > div > div:nth-child(3)').style.display = 'flex';
    }
}

// Initial check and event listener
handleResize();
window.addEventListener('resize', handleResize);

// Login form handler
document.getElementById('loginForm')?.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const accountType = document.getElementById('accountType').value;
    
    if (!email || !password || !accountType) {
        alert('Harap lengkapi semua field');
        return;
    }
    
    // Simulate login process
    console.log('Login attempt:', { email, accountType });
    
    // Redirect based on account type
    const redirects = {
        'user': 'index.html',
        'seller': 'seller-dashboard.html',
        'provider': 'jasa-dashboard.html',
        'mentor': 'edukasi-dashboard.html'
    };
    
    if (redirects[accountType]) {
        window.location.href = redirects[accountType];
    }
});
</script>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
e.preventDefault();

const email=document.getElementById('email').value.trim();
const password=document.getElementById('password').value;
const type=document.getElementById('accountType').value;

if(!email||!password||!type){
alert("Semua field wajib diisi!");
return;
}

const btn=document.getElementById('loginBtn');

btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Memproses...';
btn.disabled=true;

localStorage.setItem("userLoggedIn","true");
localStorage.setItem("userType",type);
localStorage.setItem("userName",email.split("@")[0]||"User");
localStorage.setItem("userEmail",email);

setTimeout(()=>{
if(type==="user") window.location.href="index.html";
else if(type==="seller") window.location.href="seller-dashboard.html";
else if(type==="provider") window.location.href="jasa-dashboard.html";
else if(type==="mentor") window.location.href="edukasi-dashboard.html";
},1200);

});
</script>
