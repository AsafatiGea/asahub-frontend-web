<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk - AsaHub</title>

<link rel="icon" type="image/png" href="../img/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-container">

        <a href="index.html" class="navbar-logo">
            Asa<span>Hub</span>
        </a>

        <div class="navbar-links">
            <a href="index.html">Marketplace</a>
            <a href="jasa.html">Jasa</a>
            <a href="edukasi.html">Edukasi</a>
            <a href="komunitas.html">Komunitas</a>
            <a href="tentang.html">Tentang</a>
        </div>

        <div class="navbar-actions">
            <a href="login.html" class="btn-login">Masuk</a>
            <a href="daftar.html" class="btn-daftar">Daftar</a>
        </div>

    </div>
</nav>

<!-- LOGIN SECTION -->
<section class="login-section">

    <div class="login-card">

        <div class="login-logo">
            Asa<span>Hub</span>
        </div>

        <div class="login-subtitle">
            Pusat Harapan — Menyatukan Peluang Bisnis
        </div>

        <form id="loginForm">

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="nama@email.com" required>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>

            <div class="form-group">
                <label>Jenis Akun *</label>
                <select id="accountType" required>
                    <option value="">Pilih jenis akun</option>
                    <option value="user">👤 User</option>
                    <option value="seller">🏪 Seller</option>
                    <option value="provider">🛠️ Penyedia Jasa</option>
                    <option value="mentor">🎓 Mentor Edukasi</option>
                </select>
            </div>

            <button type="submit" id="loginBtn" class="btn-login-main">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>

        </form>

        <div class="login-footer">
            <div>Belum punya akun?</div>
            <a href="daftar.html" id="registerLink" class="btn-register">
                Daftar Sekarang
            </a>
        </div>

    </div>

</section>

<!-- MOBILE NAV -->
<nav class="mobile-nav">
    <a href="index.html"><i class="fas fa-home"></i></a>
    <a href="jasa.html"><i class="fas fa-briefcase"></i></a>
    <a href="edukasi.html"><i class="fas fa-graduation-cap"></i></a>
    <a href="komunitas.html"><i class="fas fa-users"></i></a>
    <a href="tentang.html"><i class="fas fa-info-circle"></i></a>
    <a href="daftar.html"><i class="fas fa-user"></i></a>
</nav>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
e.preventDefault();

const email=document.getElementById('email').value.trim();
const password=document.getElementById('password').value;
const type=document.getElementById('accountType').value;

if(!email||!password||!type){
alert("Semua field wajib diisi!");
return;
}

const btn=document.getElementById('loginBtn');
btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Memproses...';
btn.disabled=true;

localStorage.setItem("userLoggedIn","true");
localStorage.setItem("userType",type);
localStorage.setItem("userName",email.split("@")[0]||"User");
localStorage.setItem("userEmail",email);

setTimeout(()=>{
if(type==="user") window.location.href="index.html";
else if(type==="seller") window.location.href="seller-dashboard.html";
else if(type==="provider") window.location.href="jasa-dashboard.html";
else if(type==="mentor") window.location.href="edukasi-dashboard.html";
},1200);

});
</script>

</body>
</html>
